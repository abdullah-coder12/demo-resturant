<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tandoor Multan — Smart 4K Ordering</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0A0A0A; color: white; font-family: 'Inter', sans-serif; }
        .hero-bg {
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), 
                        url('https://images.pexels.com/photos/2474661/pexels-photo-2474661.jpeg?auto=compress&w=1260');
            background-size: cover; background-position: center; height: 100vh;
        }
        .premium-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: 0.4s;
        }
        /* Order Modal Styling */
        #orderModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 p-6 bg-black/50 backdrop-blur-md border-b border-white/5">
        <div class="container mx-auto flex justify-between items-center">
            <div class="text-2xl font-display font-black text-[#F4D03F]">TANDOOR MULTAN</div>
            <div class="space-x-8">
                <a href="#menu" class="text-sm font-bold tracking-widest uppercase hover:text-[#F4D03F] transition">Menu</a>
                <a href="https://wa.me/923001234567" class="text-sm border border-[#F4D03F] px-4 py-2 text-[#F4D03F] hover:bg-[#F4D03F] hover:text-black transition">Contact</a>
            </div>
        </div>
    </nav>

    <header class="hero-bg flex items-center justify-center text-center">
        <div class="max-w-4xl px-6">
            <h1 class="text-7xl md:text-9xl font-display italic text-[#F4D03F] mb-6">Royal Dining</h1>
            <p class="text-xl text-gray-400 mb-10 tracking-[0.2em]">Swaad jo Multan ki yaad dila de.</p>
            <a href="#menu" class="bg-white text-black px-12 py-5 font-bold uppercase tracking-widest hover:bg-[#F4D03F] transition">Explore Menu</a>
        </div>
    </header>

    <section id="menu" class="py-24 container mx-auto px-6">
        <h2 class="text-5xl font-display text-center mb-16">Chef's Signature</h2>
        
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            <div class="premium-card rounded-3xl p-5 text-center">
                <img src="https://images.pexels.com/photos/12737657/pexels-photo-12737657.jpeg?auto=compress&w=800" class="h-64 w-full object-cover rounded-2xl mb-6">
                <h3 class="text-2xl font-display mb-2">Multani Mutton Karhai</h3>
                <p class="text-[#F4D03F] text-xl font-bold mb-6">Rs. 2,800</p>
                <button onclick="openOrderModal('Mutton Karhai', 2800)" class="w-full bg-[#F4D03F] text-black py-4 rounded-xl font-bold hover:bg-white transition">Order Now</button>
            </div>

            <div class="premium-card rounded-3xl p-5 text-center">
                <img src="https://images.pexels.com/photos/533325/pexels-photo-533325.jpeg?auto=compress&w=800" class="h-64 w-full object-cover rounded-2xl mb-6">
                <h3 class="text-2xl font-display mb-2">BBQ Tikka Platter</h3>
                <p class="text-[#F4D03F] text-xl font-bold mb-6">Rs. 1,200</p>
                <button onclick="openOrderModal('BBQ Tikka Platter', 1200)" class="w-full bg-[#F4D03F] text-black py-4 rounded-xl font-bold hover:bg-white transition">Order Now</button>
            </div>

            <div class="premium-card rounded-3xl p-5 text-center">
                <img src="https://images.pexels.com/photos/11134887/pexels-photo-11134887.jpeg?auto=compress&w=800" class="h-64 w-full object-cover rounded-2xl mb-6">
                <h3 class="text-2xl font-display mb-2">Special Roghni Naan</h3>
                <p class="text-[#F4D03F] text-xl font-bold mb-6">Rs. 150</p>
                <button onclick="openOrderModal('Roghni Naan', 150)" class="w-full bg-[#F4D03F] text-black py-4 rounded-xl font-bold hover:bg-white transition">Order Now</button>
            </div>
        </div>
    </section>

    <div id="orderModal">
        <div class="bg-[#1A1A1A] p-8 rounded-3xl w-full max-w-md border border-white/10 mx-4">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-display text-[#F4D03F]">Complete Your Order</h2>
                <button onclick="closeModal()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>
            
            <p class="text-sm text-gray-400 mb-6">Ordering: <span id="selectedDish" class="text-white font-bold"></span></p>

            <div class="space-y-4">
                <input type="text" id="custName" placeholder="Apna Naam Likhein" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl focus:border-[#F4D03F] outline-none">
                <input type="tel" id="custPhone" placeholder="WhatsApp Number" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl focus:border-[#F4D03F] outline-none">
                <textarea id="custAddress" placeholder="Pura Address Likhein" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl focus:border-[#F4D03F] outline-none h-24"></textarea>
                
                <button onclick="submitToWhatsApp()" class="w-full bg-green-600 text-white py-5 rounded-xl font-bold text-lg hover:bg-green-500 transition shadow-2xl">
                    <i class="fab fa-whatsapp mr-2"></i> WhatsApp Par Order Bhejein
                </button>
            </div>
        </div>
    </div>

    <script>
        let selectedItem = "";
        let selectedPrice = 0;

        function openOrderModal(name, price) {
            selectedItem = name;
            selectedPrice = price;
            document.getElementById('selectedDish').innerText = name + " (Rs. " + price + ")";
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function submitToWhatsApp() {
            const name = document.getElementById('custName').value;
            const phone = document.getElementById('custPhone').value;
            const address = document.getElementById('custAddress').value;

            if(!name || !phone || !address) {
                alert("Bhai, saari details bharna zaroori hain!");
                return;
            }

            // Owner's Number (Yahan badal dena)
            const ownerNumber = "923001234567";

            const message = `*NEW ORDER RECEIVED*%0A` +
                            `--------------------------%0A` +
                            `*Dish:* ${selectedItem}%0A` +
                            `*Price:* Rs. ${selectedPrice}%0A` +
                            `--------------------------%0A` +
                            `*Customer Details:*%0A` +
                            `*Name:* ${name}%0A` +
                            `*Phone:* ${phone}%0A` +
                            `*Address:* ${address}%0A` +
                            `--------------------------%0A` +
                            `_Sent from Website Form_`;

            window.open(`https://wa.me/${ownerNumber}?text=${message}`, '_blank');
            closeModal();
        }
    </script>

</body>
</html>
